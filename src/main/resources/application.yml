spring:
  application:
    name: meditrip

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        highlight_sql: true
      hibernate.type.preferred_uuid_jdbc_type: CHAR
      logging:
        level:
          org.hibernate.SQL: debug
          org.hibernate.orm.schema: debug

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - email
              - profile

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000 # 1시간 (1000 * 60 * 60)
  refresh-token-expiration: 604800000 # 7일 (1000 * 60 * 60 * 24 * 7)
  token-type-claim: "token_type"
  access-token-type: "access"
  refresh-token-type: "refresh"
  redis-prefix-refresh: "mediTrip:refreshToken:"

email:
  google:
    email: ${EMAIL_GOOGLE_EMAIL}
    password: ${EMAIL_GOOGLE_PASSWORD}

google:
  api:
    key: ${GOOGLE_MAPS_KEY}
    find-place:
      url-prefix: https://maps.googleapis.com/maps/api/place/findplacefromtext/json?input=
      url-params: "&inputtype=textquery&fields=place_id&"
    detail:
      url-prefix: https://maps.googleapis.com/maps/api/place/details/json?place_id=
      url-params: "&"
    nearby-search:
      url: https://places.googleapis.com/v1/places:searchNearby
      field-mask: places.id,places.displayName,places.formattedAddress,places.location,places.nationalPhoneNumber,places.googleMapsUri,places.regularOpeningHours.periods,places.regularOpeningHours.openNow

pharmacy:
  api:
    key: ${PHARMACY_API_KEY}
    url: https://apis.data.go.kr/B552657/ErmctInsttInfoInqireService/getParmacyListInfoInqire

cloud:
  aws:
    s3:
      bucket: ${S3_BUCKET_NAME}
      cdn-domain: ${CDN_DOMAIN}
    region: ${S3_REGION}

server:
  forward-headers-strategy: framework
